namespace: devops-tracker

# Fixed resource names — must match existing k8s manifests.
nameOverride: devops-tracker-api
fullnameOverride: devops-tracker-api

containerName: api

image:
  repository: devopstrackerdevvsh6qw.azurecr.io/devops-tracker-api
  tag: latest
  pullPolicy: Always

replicas: 1
revisionHistoryLimit: 5

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxUnavailable: 25%
    maxSurge: 25%

containerPort: 3000
portName: http

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 2
  failureThreshold: 3

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 3

service:
  type: ClusterIP
  port: 80
  targetPort: 3000
  portName: http

ingress:
  enabled: true
  className: nginx
  host: api.devopstracker.com
  path: /
  pathType: Prefix
  servicePort: 80
  clusterIssuer: letsencrypt-production
  tls:
    enabled: true
    secretName: api-devopstracker-com-tls
  sourceWhitelist:
    enabled: true
    # Cloudflare proxy IP ranges — https://www.cloudflare.com/ips/
    ranges:
      - 173.245.48.0/20
      - 103.21.244.0/22
      - 103.22.200.0/22
      - 103.31.4.0/22
      - 141.101.64.0/18
      - 108.162.192.0/18
      - 190.93.240.0/20
      - 188.114.96.0/20
      - 197.234.240.0/22
      - 198.41.128.0/17
      - 162.158.0.0/15
      - 104.16.0.0/13
      - 104.24.0.0/14
      - 172.64.0.0/13
      - 131.0.72.0/22
      - 2400:cb00::/32
      - 2606:4700::/32
      - 2803:f800::/32
      - 2405:b500::/32
      - 2405:8100::/32
      - 2a06:98c0::/29
      - 2c0f:f248::/32

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

podLabels: {}

serviceAccount:
  create: true
  name: ""
  annotations: {}

rbac:
  create: true

azure:
  tenantId: ""
  # Application AKS workload identity. Used by the API ServiceAccount and Key Vault CSI.
  clientId: ""
  # PostgreSQL bootstrap Job identity. Must not be the application identity above.

postgres:
  enabled: false
  # Production authentication mode. Entra is the only supported mode for deployed environments.
  authMode: entra
  host: ""
  port: 5432
  database: devops_tracker
  # PostgreSQL role mapped to the application managed identity (also the bootstrap principal name).
  user: ""
  ssl:
    enabled: true
    rejectUnauthorized: true

keyVault:
  enabled: false
  name: ""
  mountPath: "/mnt/secrets-store"
  secrets: []

postgresBootstrap:
  enabled: false
  managedIdentityClientId: ""
  # Bootstrap managed identity or Entra admin group name. Must match the
  # identity used by the Job token.
  entraAdminUser: ""
  image:
    repository: devopstrackerdevvsh6qw.azurecr.io/devops-tracker-ops
    tag: postgres-entra-bootstrap
    pullPolicy: Always

networkPolicy:
  enabled: true
  ingressPort: 3000
  postgres:
    enabled: true
    # PostgreSQL private endpoint IP (/32) or delegated subnet CIDR.
    # See infra/platform/locals.tf (snet-postgres) or runtime-aks postgres outputs.
    cidr: "10.20.2.0/24"
    port: 5432
  externalHttps:
    # Allows outbound HTTPS for Azure SDKs, Application Insights, and other required public HTTPS dependencies.
    # Kubernetes NetworkPolicy cannot filter by FQDN or Azure service tag.
    # Tighten later using Azure Firewall / controlled egress when that roadmap phase is reached.
    enabled: true
    cidrs:
      - "0.0.0.0/0"