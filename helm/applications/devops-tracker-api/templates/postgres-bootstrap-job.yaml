{{- if .Values.postgresBootstrap.enabled }}
{{- $clientId := required "postgresBootstrap.managedIdentityClientId is required when postgresBootstrap.enabled is true" (include "devops-tracker-api.postgresBootstrapClientId" .) }}
{{- $tenantId := required "azure.tenantId is required when postgresBootstrap.enabled is true" (include "devops-tracker-api.azureTenantId" .) }}
{{- $host := required "postgres.host is required when postgresBootstrap.enabled is true" (include "devops-tracker-api.postgresHost" .) }}
{{- $database := required "postgres.database is required when postgresBootstrap.enabled is true" (include "devops-tracker-api.postgresDatabase" .) }}
{{- $user := required "postgres.user is required when postgresBootstrap.enabled is true" (include "devops-tracker-api.postgresUser" .) }}
{{- $entraAdminUser := required "postgresBootstrap.entraAdminUser is required when postgresBootstrap.enabled is true" .Values.postgresBootstrap.entraAdminUser }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: postgres-entra-bootstrap
  namespace: {{ include "devops-tracker-api.namespace" . }}
  labels:
    app.kubernetes.io/name: postgres-entra-bootstrap
    app.kubernetes.io/part-of: devops-tracker
    {{- include "devops-tracker-api.labels" . | nindent 4 }}
  annotations:
    azure.workload.identity/client-id: {{ $clientId | quote }}
---
apiVersion: batch/v1
kind: Job
metadata:
  name: postgres-entra-bootstrap
  namespace: {{ include "devops-tracker-api.namespace" . }}
  labels:
    app.kubernetes.io/name: postgres-entra-bootstrap
    app.kubernetes.io/part-of: devops-tracker
    {{- include "devops-tracker-api.labels" . | nindent 4 }}
  annotations:
    devops-tracker/one-time-operation: "true"
spec:
  ttlSecondsAfterFinished: 300
  backoffLimit: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres-entra-bootstrap
        app.kubernetes.io/part-of: devops-tracker
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: postgres-entra-bootstrap
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
      containers:
        - name: bootstrap
          image: {{ printf "%s:%s" .Values.postgresBootstrap.image.repository .Values.postgresBootstrap.image.tag | quote }}
          imagePullPolicy: {{ .Values.postgresBootstrap.image.pullPolicy | quote }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
          env:
            - name: AZURE_CONFIG_DIR
              value: /tmp/.azure
            - name: AZURE_CLIENT_ID
              value: {{ $clientId | quote }}
            - name: AZURE_TENANT_ID
              value: {{ $tenantId | quote }}
            - name: POSTGRES_HOST
              value: {{ $host | quote }}
            - name: POSTGRES_DATABASE
              value: {{ $database | quote }}
            - name: POSTGRES_PORT
              value: {{ include "devops-tracker-api.postgresPort" . | quote }}
            - name: POSTGRES_ENTRA_ADMIN_USER
              value: {{ $entraAdminUser | quote }}
            - name: POSTGRES_APP_PRINCIPAL_NAME
              value: {{ $user | quote }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
{{- end }}
