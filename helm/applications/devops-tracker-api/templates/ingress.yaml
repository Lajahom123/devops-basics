{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress

metadata:
  name: {{ include "devops-tracker-api.fullname" . }}
  namespace: {{ include "devops-tracker-api.namespace" . }}
  annotations:
    {{- with .Values.ingress.clusterIssuer }}
    cert-manager.io/cluster-issuer: {{ . | quote }}
    {{- end }}
    {{- if and .Values.ingress.sourceWhitelist.enabled .Values.ingress.sourceWhitelist.ranges }}
    nginx.ingress.kubernetes.io/whitelist-source-range: {{ join "," .Values.ingress.sourceWhitelist.ranges | quote }}
    {{- end }}

spec:
  ingressClassName: {{ .Values.ingress.className }}

  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host | quote }}
      secretName: {{ .Values.ingress.tls.secretName | quote }}
  {{- end }}

  rules:
    - host: {{ .Values.ingress.host | quote }}
      http:
        paths:
          - path: {{ .Values.ingress.path }}
            pathType: {{ .Values.ingress.pathType }}
            backend:
              service:
                name: {{ include "devops-tracker-api.fullname" . }}
                port:
                  number: {{ .Values.ingress.servicePort }}
{{- end }}
