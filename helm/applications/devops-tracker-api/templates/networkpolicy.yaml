{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy

metadata:
  name: {{ include "devops-tracker-api.fullname" . }}-network-policy
  namespace: {{ include "devops-tracker-api.namespace" . }}
  labels:
    {{- include "devops-tracker-api.labels" . | nindent 4 }}

spec:
  podSelector:
    matchLabels:
      {{- include "devops-tracker-api.selectorLabels" . | nindent 6 }}

  policyTypes:
    - Ingress
    - Egress

  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
          podSelector:
            matchLabels:
              app.kubernetes.io/name: ingress-nginx
              app.kubernetes.io/component: controller
      ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.ingressPort }}

  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    {{- if and .Values.networkPolicy.postgres.enabled .Values.networkPolicy.postgres.cidr }}
    - to:
        - ipBlock:
            cidr: {{ .Values.networkPolicy.postgres.cidr | quote }}
      ports:
        - protocol: TCP
          port: {{ .Values.networkPolicy.postgres.port }}
    {{- end }}
    {{- if .Values.networkPolicy.externalHttps.enabled }}
    {{- range .Values.networkPolicy.externalHttps.cidrs }}
    - to:
        - ipBlock:
            cidr: {{ . | quote }}
      ports:
        - protocol: TCP
          port: 443
    {{- end }}
    {{- end }}
{{- end }}
