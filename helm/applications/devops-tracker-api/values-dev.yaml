namespace: devops-tracker

image:
  repository: devopstrackerdevvsh6qw.azurecr.io/devops-tracker-api
  tag: latest
  pullPolicy: IfNotPresent

ingress:
  enabled: true
  className: nginx
  host: api.devopstracker.com
  sourceWhitelist:
    enabled: true

podLabels:
  azure.workload.identity/use: "true"

azure:
  tenantId: ""
  clientId: ""

postgres:
  enabled: true
  authMode: entra
  host: "psql-devops-tracker-dev-swdct.postgres.database.azure.com"
  port: 5432
  database: devops_tracker
  user: "id-devops-tracker-dev-aks-workload"
  ssl:
    enabled: true
    rejectUnauthorized: true

postgresBootstrap:
  enabled: false
  managedIdentityClientId: ""
  entraAdminUser: "devops-tracker-postgres-admins"
  image:
    repository: devopstrackerdevvsh6qw.azurecr.io/devops-tracker-ops
    tag: postgres-entra-bootstrap
    pullPolicy: Always

keyVault:
  enabled: true
  name: "kv-devops-tracker-dev-vs"
  secrets:
    - objectName: "applicationinsights-connection-string"
      objectType: "secret"
      objectAlias: "applicationinsights-connection-string"
