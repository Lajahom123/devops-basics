{{- if .Values.migrations.enabled }}
{{- $clientId := required "migrations.managedIdentityClientId is required when migrations.enabled is true" .Values.migrations.managedIdentityClientId }}
{{- $jobCtx := dict "root" . "jobName" .Values.migrations.serviceAccountName "clientId" $clientId }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.migrations.serviceAccountName }}
  namespace: {{ include "devops-tracker-jobs.namespace" . }}
  labels:
    {{- include "devops-tracker-jobs.job.labels" $jobCtx | nindent 4 }}
  annotations:
    azure.workload.identity/client-id: {{ $clientId | quote }}
{{- end }}
