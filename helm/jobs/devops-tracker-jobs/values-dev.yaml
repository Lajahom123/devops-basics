postgres:
  host: "psql-devops-tracker-dev-swdct.postgres.database.azure.com"
  port: 5432
  database: devops_tracker
  appUser: "id-devops-tracker-dev-aks-workload"
  migrationUser: "id-devops-tracker-dev-migration-job"

bootstrap:
  enabled: false
  entraAdminUser: "devops-tracker-postgres-admins"
  principals:
    - roleName: "id-devops-tracker-dev-aks-workload"
      managedIdentityClientId: ""
      grantProfile: app
    - roleName: "id-devops-tracker-dev-migration-job"
      managedIdentityClientId: ""
      grantProfile: migration
  image:
    repository: devopstrackerdevvsh6qw.azurecr.io/devops-tracker-ops
    tag: postgres-entra-bootstrap
    pullPolicy: Always

migrations:
  enabled: false
