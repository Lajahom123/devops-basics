name: Stop dev resources

on:
  workflow_dispatch:
  schedule:
    # During summer time this runs at 00:00 Berlin unless adjusted.
    - cron: "0 22 * * *"

permissions:
  id-token: write
  contents: read

jobs:
  stop-dev-resources:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_DEPLOY_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Stop dev resources
        run: ./scripts/stop-dev-resources.sh