name: Stop dev resources

on:
  workflow_dispatch:
  #schedule:
   # - cron: "0 22 * * *"

permissions:
  id-token: write
  contents: read

jobs:
  stop-dev-resources:
    runs-on: ubuntu-latest
    environment: dev-operations

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_DEV_OPERATOR_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Make script executable
        run: chmod +x ./scripts/stop-dev-resources.sh

      - name: Stop dev resources
        run: ./scripts/stop-dev-resources.sh