name: Build and deploy to AKS dev

on:
  workflow_dispatch:

  push:
    branches:
      - master
    paths:
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - "Dockerfile"
      - ".dockerignore"
      - "helm/applications/devops-tracker-api/**"
      - ".github/workflows/build-and-deploy-aks.yml"

permissions:
  id-token: write
  contents: read

env:
  ACR_NAME: devopstrackerdevvsh6qw
  IMAGE_NAME: devops-tracker-api
  AKS_CLUSTER_NAME: aks-devops-tracker-dev-vsh6qw-swn
  RESOURCE_GROUP: rg-devops-tracker-dev-runtime
  NAMESPACE: devops-tracker
  HELM_RELEASE_NAME: devops-tracker-api

jobs:
  build:
    name: Build image
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.image.outputs.image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_DEPLOY_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Login Docker to ACR
        run: |
          az acr login --name "$ACR_NAME"

      - name: Build and push image
        id: image
        run: |
          IMAGE_TAG=${{ github.sha }}
          IMAGE="${ACR_NAME}.azurecr.io/${IMAGE_NAME}:${IMAGE_TAG}"

          docker build -t "$IMAGE" .
          docker push "$IMAGE"

          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy to AKS
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_DEPLOY_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Install helm
        uses: azure/setup-helm@v4

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group "$RESOURCE_GROUP" \
            --name "$AKS_CLUSTER_NAME" \
            --overwrite-existing

      - name: Deploy application
        id: deploy
        run: |
          helm upgrade "$HELM_RELEASE_NAME" helm/applications/devops-tracker-api \
            --install \
            --namespace "$NAMESPACE" \
            --values helm/applications/devops-tracker-api/values-dev.yaml \
            --set image.tag=${{ needs.build.outputs.image_tag }} \
            --wait \
            --timeout 3m

      - name: Rollback on failed deploy
        if: failure() && steps.deploy.outcome == 'failure'
        run: |
          if helm history "$HELM_RELEASE_NAME" --namespace "$NAMESPACE" | grep -q deployed; then
            helm rollback "$HELM_RELEASE_NAME" \
              --namespace "$NAMESPACE" \
              --wait \
              --timeout 3m
          else
            echo "No previous successful release to roll back to."
          fi

      - name: Verify health through cluster service
        run: |
          curl --fail --silent --show-error https://api.devopstracker.com/health
