name: Start dev resources

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  start-dev-resources:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_DEPLOY_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Start dev resources
        run: ./scripts/start-dev-resources.sh