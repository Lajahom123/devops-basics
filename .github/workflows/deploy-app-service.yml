name: Build and deploy

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  ACR_NAME: devopstracker29193
  ACR_LOGIN_SERVER: devopstracker29193.azurecr.io
  IMAGE_NAME: devops-tracker
  WEBAPP_NAME: devops-tracker-29193
  RESOURCE_GROUP: rg-devops-tracker-dev
  MIGRATION_IMAGE: devops-tracker-migrations
  MIGRATION_JOB_NAME: job-devops-tracker-migrations
  SLOT_NAME: staging

jobs:
  deploy-staging:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_DEPLOY_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name "$ACR_NAME"

      - name: Build image
        run: |
          docker build \
            -t "$ACR_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }}" \
            -t "$ACR_LOGIN_SERVER/$IMAGE_NAME:latest" \
            .

      - name: Push image
        run: |
          docker push "$ACR_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }}"
          docker push "$ACR_LOGIN_SERVER/$IMAGE_NAME:latest"

      - name: Build and push migration image
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -f Dockerfile.flyway \
            -t "$ACR_LOGIN_SERVER/$MIGRATION_IMAGE:${{ github.sha }}" \
            --push \
            .

      - name: Update migration job image
        run: |
          az containerapp job update \
            --resource-group "$RESOURCE_GROUP" \
            --name "$MIGRATION_JOB_NAME" \
            --image "$ACR_LOGIN_SERVER/$MIGRATION_IMAGE:${{ github.sha }}"

      - name: Start migration job
        id: start_migration
        run: |
          EXECUTION_NAME=$(az containerapp job start \
            --resource-group "$RESOURCE_GROUP" \
            --name "$MIGRATION_JOB_NAME" \
            --query name \
            -o tsv)

          echo "execution_name=$EXECUTION_NAME" >> "$GITHUB_OUTPUT"

      - name: Wait for migration job
        run: |
          EXECUTION_NAME="${{ steps.start_migration.outputs.execution_name }}"

          for i in {1..60}; do
            STATUS=$(az containerapp job execution list \
              --resource-group "$RESOURCE_GROUP" \
              --name "$MIGRATION_JOB_NAME" \
              --query "[?name=='$EXECUTION_NAME'].properties.status | [0]" \
              -o tsv)

            echo "Migration job status: $STATUS"

            if [ "$STATUS" = "Succeeded" ]; then
              exit 0
            fi

            if [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Canceled" ]; then
              az containerapp job logs show \
                --resource-group "$RESOURCE_GROUP" \
                --name "$MIGRATION_JOB_NAME"
              exit 1
            fi

            sleep 10
          done

          echo "Migration job timed out"

          az containerapp job logs show \
            --resource-group "$RESOURCE_GROUP" \
            --name "$MIGRATION_JOB_NAME"

          exit 1

      - name: Update staging slot container image
        run: |
          az webapp config container set \
            --name "$WEBAPP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --slot "$SLOT_NAME" \
            --container-image-name "$ACR_LOGIN_SERVER/$IMAGE_NAME:${{ github.sha }}" \
            --container-registry-url "https://$ACR_LOGIN_SERVER"

      - name: Restart staging slot
        run: |
          az webapp restart \
            --name "$WEBAPP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --slot "$SLOT_NAME"

  validate-staging:
    needs: deploy-staging
    runs-on: [self-hosted, vnet]

    steps:
      - name: Verify staging slot health endpoint
        run: |
          for i in {1..15}; do
            if curl --fail --silent --show-error \
              "https://$WEBAPP_NAME-$SLOT_NAME.azurewebsites.net/health"; then
              echo "Staging health check passed"
              exit 0
            fi

            echo "Waiting for staging slot startup..."
            sleep 10
          done

          echo "Staging health check failed"
          exit 1

      - name: Verify staging slot version endpoint
        run: |
          curl --fail --silent --show-error \
            "https://$WEBAPP_NAME-$SLOT_NAME.azurewebsites.net/version"

  swap-production:
    needs: validate-staging
    runs-on: ubuntu-latest

    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_DEPLOY_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Swap staging slot into production
        run: |
          az webapp deployment slot swap \
            --name "$WEBAPP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --slot "$SLOT_NAME" \
            --target-slot production

  validate-production:
    needs: swap-production
    runs-on: [self-hosted, vnet]

    steps:
      - name: Verify production health endpoint
        run: |
          for i in {1..10}; do
            if curl --fail --silent --show-error \
              "https://$WEBAPP_NAME.azurewebsites.net/health"; then
              echo "Production health check passed"
              exit 0
            fi

            echo "Waiting for production after swap..."
            sleep 10
          done

          echo "Production health failed after swap"
          exit 1

      - name: Verify production version endpoint
        run: |
          curl --fail --silent --show-error \
            "https://$WEBAPP_NAME.azurewebsites.net/version"

      - name: Verify Front Door health endpoint
        env:
          FRONT_DOOR_URL: ${{ secrets.FRONT_DOOR_URL }}
        run: |
          curl --fail --silent --show-error \
            "${FRONT_DOOR_URL%/}/health"