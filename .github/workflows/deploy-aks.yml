name: Deploy to AKS dev

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  ACR_NAME: devopstracker29193
  IMAGE_NAME: devops-tracker
  AKS_CLUSTER_NAME: aks-devops-tracker
  RESOURCE_GROUP: rg-devops-tracker-dev
  NAMESPACE: devops-tracker
  DEPLOYMENT_NAME: devops-tracker
  CONTAINER_NAME: devops-tracker

jobs:
  build:
    name: Build image
    runs-on: ubuntu-latest

    outputs:
      image: ${{ steps.image.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_DEPLOY_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Build image in ACR
        id: image
        run: |
          IMAGE_TAG=${{ github.sha }}
          IMAGE="${ACR_NAME}.azurecr.io/${IMAGE_NAME}:${IMAGE_TAG}"

          az acr build \
            --registry "$ACR_NAME" \
            --image "$IMAGE_NAME:$IMAGE_TAG" \
            .

          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy to AKS
    runs-on:
      - self-hosted
      - vnet

    needs: build

    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_DEPLOY_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group "$RESOURCE_GROUP" \
            --name "$AKS_CLUSTER_NAME" \
            --overwrite-existing

      - name: Update deployment image
        run: |
          kubectl set image deployment/$DEPLOYMENT_NAME \
            $CONTAINER_NAME=${{ needs.build.outputs.image }} \
            -n "$NAMESPACE"

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/$DEPLOYMENT_NAME \
            -n "$NAMESPACE" \
            --timeout=180s

      - name: Verify health through cluster service
        run: |
          kubectl run aks-health-check \
            --rm -i \
            --restart=Never \
            --image=curlimages/curl \
            -n "$NAMESPACE" \
            -- curl --fail --silent --show-error http://devops-tracker/health