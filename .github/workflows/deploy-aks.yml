name: Deploy to AKS dev

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  ACR_NAME: devopstrackerdevvsh6qw
  IMAGE_NAME: devops-tracker-api
  AKS_CLUSTER_NAME: aks-devops-tracker-dev-vsh6qw-swn
  RESOURCE_GROUP: rg-devops-tracker-dev-runtime
  NAMESPACE: devops-tracker
  DEPLOYMENT_NAME: devops-tracker-api
  CONTAINER_NAME: api

jobs:
  build:
    name: Build image
    runs-on: ubuntu-latest

    outputs:
      image: ${{ steps.image.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_DEPLOY_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login Docker to ACR
        run: |
          az acr login --name "$ACR_NAME"

      - name: Build image with Docker and push to ACR
        id: image
        run: |
          IMAGE_TAG=${{ github.sha }}
          IMAGE="${ACR_NAME}.azurecr.io/${IMAGE_NAME}:${IMAGE_TAG}"

          docker build -t "$IMAGE" .
          docker push "$IMAGE"

          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy to AKS
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_DEPLOY_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group "$RESOURCE_GROUP" \
            --name "$AKS_CLUSTER_NAME" \
            --overwrite-existing

      - name: Update deployment image
        run: |
          kubectl set image deployment/$DEPLOYMENT_NAME \
            $CONTAINER_NAME=${{ needs.build.outputs.image }} \
            -n "$NAMESPACE"

      - name: Wait for rollout
        id: rollout
        run: |
          kubectl rollout status deployment/$DEPLOYMENT_NAME \
            -n "$NAMESPACE" \
            --timeout=180s

      - name: Rollback on failed rollout
        if: failure() && steps.rollout.outcome == 'failure'
        run: |
          kubectl rollout undo deployment/$DEPLOYMENT_NAME \
            -n "$NAMESPACE"

          kubectl rollout status deployment/$DEPLOYMENT_NAME \
            -n "$NAMESPACE" \
            --timeout=180s

      - name: Verify health through cluster service
        run: |
          kubectl run aks-health-check \
            --rm -i \
            --restart=Never \
            --image=curlimages/curl \
            -n "$NAMESPACE" \
            -- curl --fail --silent --show-error http://devops-tracker-api/health