apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: devops-tracker-api
  namespace: devops-tracker

spec:
  ingressClassName: nginx

  rules:
    - host: devops-tracker.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: devops-tracker-api
                port:
                  number: 80