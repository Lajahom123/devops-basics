apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: devops-tracker-api
  namespace: devops-tracker
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: devops-tracker-api

  minReplicas: 2
  maxReplicas: 5

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70