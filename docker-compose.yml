services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      PORT: "3000"
      APP_VERSION: "1.0.0"
      NODE_ENV: production
      DATABASE_URL: postgres://devops:devops_password@db:5432/devops_tracker
      DATABASE_SSL: "false"
      DATABASE_SSL_REJECT_UNAUTHORIZED: "true"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: devops_tracker
      POSTGRES_USER: devops
      POSTGRES_PASSWORD: devops_password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devops -d devops_tracker"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
